<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Navy rounded background -->
  <rect width="32" height="32" rx="7" fill="#003a71"/>

  <!-- Jacket: shoulders, sleeves, body and a V-neck collar opening -->
  <path d="M16,9
           L19.4,6.2 L21.2,8.8 L26.8,11.8 L27.8,17.2 L23.8,18.4 L21.2,13.8 L22,26.6
           L16,27.2
           L10,26.6 L10.8,13.8 L8.2,18.4 L4.2,17.2 L5.2,11.8 L10.8,8.8 L12.6,6.2 Z"
        fill="#ffcc00"/>

  <!-- Folded collar (under-collar shadow on each side of the V) -->
  <path d="M12.6,6.2 L16,9 L14.2,9.4 Z" fill="#002551"/>
  <path d="M19.4,6.2 L16,9 L17.8,9.4 Z" fill="#002551"/>

  <!-- Centre zipper + pull -->
  <rect x="15.5" y="9"   width="1"   height="15.5" rx="0.5" fill="#002551"/>
  <rect x="14.9" y="9"   width="2.2" height="1.8"  rx="0.6" fill="#002551"/>

  <!-- Cuffs to read the sleeves clearly -->
  <path d="M4.2,17.2 L8.2,18.4 L8.7,17.0 L4.7,15.8 Z"   fill="#002551"/>
  <path d="M27.8,17.2 L23.8,18.4 L23.3,17.0 L27.3,15.8 Z" fill="#002551"/>
</svg>
